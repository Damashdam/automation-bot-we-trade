services:
  news-bot:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      WA_HEADLESS: "true"
      DATA_DIR: /app/data
      PORT: "8080"
      CHROME_PATH: /usr/bin/chromium
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  bot-data:
